clone:
  git:
    image: harbor.crystalnet.org/dockerhub-proxy/woodpeckerci/plugin-git:2.9.2
    settings:
      partial: false
      depth: 1

steps:
  renovate:
    image: harbor.crystalnet.org/dockerhub-proxy/renovate/renovate:38.142.7
    environment:
      RENOVATE_CONFIG_FILE: .woodpecker/renovate_config.json
      RENOVATE_DRY_RUN: false
      RENOVATE_ENDPOINT: https://api.github.com
      SHELL: /bin/bash
      GITHUB_COM_TOKEN:
        from_secret: GITHUB_TOKEN
      RENOVATE_TOKEN:
        from_secret: renovate_token
    commands:
      - LOG_LEVEL=debug renovate --ignore-pr-author true
when:
  - event: cron
    branch: ${CI_REPO_DEFAULT_BRANCH}
  - event: manual
    branch: ${CI_REPO_DEFAULT_BRANCH}
